<!DOCTYPE html>
<html lang="de" class="min-h-screen">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Woche - Advanced Modeling and System Simulation</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vibrant: {
                            bg: '#090d16',
                            surface: '#0f172a',
                            surfaceLight: '#1e293b',
                            cyan: '#06b6d4',
                            pink: '#ec4899',
                            yellow: '#eab308',
                            purple: '#8b5cf6',
                            text: '#f8fafc',
                            textMuted: '#94a3b8'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'Outfit', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    
    <!-- Global Custom Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <!-- Highlight.js for beautiful code syntax highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/tokyo-night-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>

    <!-- KaTeX for beautiful math equations rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    
    <!-- Mermaid for flowcharts and architecture rendering -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
</head>
<body class="bg-vibrant-bg text-vibrant-text antialiased min-h-screen flex flex-col md:flex-row">

    <!-- Mobile Header -->
    <div class="md:hidden flex items-center justify-between px-6 py-4 bg-slate-950 border-b border-slate-900 sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-gradient-to-tr from-vibrant-cyan to-vibrant-purple rounded-lg flex items-center justify-center">
                <span class="text-white text-xs font-bold font-mono">AMS</span>
            </div>
            <span class="text-sm font-bold text-white font-mono">AMS 2026</span>
        </div>
        <button id="sidebar-toggle" class="p-2 text-slate-400 hover:text-white focus:outline-none">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>
    </div>

    <!-- Sidebar Navigation -->
    <aside id="sidebar-nav-container" class="w-80 bg-slate-950/80 md:bg-slate-950/30 border-r border-slate-900 flex-shrink-0 fixed inset-y-0 left-0 z-40 transform -translate-x-full md:translate-x-0 md:static sidebar-transition flex flex-col h-full md:h-screen sticky top-0 overflow-y-auto">
        <!-- Sidebar Brand -->
        <div class="p-6 border-b border-slate-900/60 flex items-center gap-3">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-vibrant-cyan to-vibrant-purple rounded-xl flex items-center justify-center shadow-lg shadow-cyan-500/15">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-sm font-bold text-white font-mono leading-none">AMS-Kurs</h1>
                    <span class="text-[10px] text-slate-500 font-mono tracking-wider">BTU COTTBUS 2026</span>
                </div>
            </a>
        </div>
        
        <!-- Sidebar Navigation List -->
        <nav class="flex-1 p-4">
            <div class="px-3 mb-3 text-[10px] font-mono text-slate-500 uppercase tracking-widest">Syllabus / Wochen</div>
            <ul id="sidebar-weeks-list" class="space-y-1">
                <!-- Dynamic weeks list from main.js -->
            </ul>
        </nav>
        
        <!-- Sidebar Footer -->
        <div class="p-4 border-t border-slate-900/60 bg-slate-950/20 text-center">
            <a 
                href="index.html" 
                class="inline-flex items-center justify-center gap-2 w-full py-2.5 rounded-lg border border-slate-800 hover:border-slate-700 bg-slate-900/40 text-xs font-mono text-slate-400 hover:text-white transition duration-200"
            >
                <span>&larr;</span> Zum Portal Home
            </a>
        </div>
    </aside>

    <!-- Main Viewport Content -->
    <div class="flex-1 flex flex-col min-w-0 md:h-screen md:overflow-y-auto">
        
        <!-- Top Sticky Breadcrumb Nav -->
        <header class="bg-vibrant-bg/65 backdrop-blur-md sticky top-12 md:top-0 z-30 border-b border-slate-900/60 py-4 px-6 md:px-8 flex flex-col sm:flex-row justify-between sm:items-center gap-2">
            <div>
                <div id="header-module-title" class="text-[10px] font-mono text-cyan-400 uppercase tracking-wider"></div>
                <h2 id="header-week-title" class="text-xl md:text-2xl font-black text-white"></h2>
            </div>
            
            <a href="index.html" class="hidden sm:inline-flex items-center text-xs text-slate-400 hover:text-cyan-400 font-mono transition-colors">
                🏠 Dashboard-Home
            </a>
        </header>

        <!-- Tabbed Menu Selection -->
        <nav class="bg-slate-950/20 border-b border-slate-900 px-6 md:px-8">
            <div class="flex space-x-8 overflow-x-auto">
                <button 
                    id="tab-btn-intro" 
                    class="py-4 text-sm font-semibold text-slate-400 hover:text-white transition-all border-b-2 border-transparent select-none whitespace-nowrap focus:outline-none flex items-center gap-2"
                >
                    <span>📖</span> Theoretische Einführung
                </button>
                <button 
                    id="tab-btn-infographic" 
                    class="py-4 text-sm font-semibold text-slate-400 hover:text-white transition-all border-b-2 border-transparent select-none whitespace-nowrap focus:outline-none flex items-center gap-2"
                >
                    <span>📊</span> Infografik
                </button>
                <button 
                    id="tab-btn-problemset" 
                    class="py-4 text-sm font-semibold text-slate-400 hover:text-white transition-all border-b-2 border-transparent select-none whitespace-nowrap focus:outline-none flex items-center gap-2"
                >
                    <span>💻</span> Problem Set
                </button>
                <button 
                    id="tab-btn-quiz" 
                    class="py-4 text-sm font-semibold text-slate-400 hover:text-white transition-all border-b-2 border-transparent select-none whitespace-nowrap focus:outline-none flex items-center gap-2"
                >
                    <span>🧠</span> Quiz
                </button>
            </div>
        </nav>

        <!-- Dynamic Loaded Viewport Content -->
        <main class="flex-1 p-6 md:p-8 max-w-5xl w-full mx-auto" id="tab-viewport-content">
            <!-- Content loaded via main.js -->
        </main>
        
    </div>

    <!-- Main Controller Scripts -->
    <script type="module" src="assets/js/main.js?v=1.0.2"></script>
</body>
</html>
