<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infografik Woche 1</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
theme: {
extend: {
colors: {
vibrant: {
bg: '#0f172a',
surface: '#1e293b',
surfaceLight: '#334155',
cyan: '#06b6d4',
pink: '#ec4899',
yellow: '#eab308',
purple: '#8b5cf6',
text: '#f8fafc',
textMuted: '#94a3b8'
}
}
}
}
}
</script>
<style>
body {
background-color: #0f172a;
color: #f8fafc;
font-family: 'Inter', system-ui, sans-serif;
}
.chart-container {
position: relative;
width: 100%;
max-width: 800px;
margin-left: auto;
margin-right: auto;
height: 350px;
}
.glass-card {
background: rgba(30, 41, 59, 0.7);
backdrop-filter: blur(10px);
border: 1px solid rgba(255, 255, 255, 0.1);
}
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="antialiased p-6">
    <div class="max-w-4xl mx-auto space-y-8">
        <div class="text-center">
            <h1 class="text-2xl md:text-3xl font-black text-white">Simulations-Paradigmen im Vergleich</h1>
            <p class="text-sm text-vibrant-textMuted mt-1">Einsatzhäufigkeit verschiedener Simulationstypen in Forschung & Industrie</p>
        </div>

        <div class="glass-card rounded-2xl p-6">
            <div class="chart-container">
                <canvas id="week1Chart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('week1Chart').getContext('2d');
        new Chart(ctx, {
            type: 'polarArea',
            data: {
                labels: ['Monte Carlo', 'Diskrete Events (DES)', 'Agenten-basiert (ABM)', 'System Dynamics (SD)'],
                datasets: [{
                    data: [35, 25, 20, 20],
                    backgroundColor: [
                        'rgba(6, 182, 212, 0.7)',
                        'rgba(236, 72, 153, 0.7)',
                        'rgba(139, 92, 246, 0.7)',
                        'rgba(234, 179, 8, 0.7)'
                    ],
                    borderColor: 'rgba(255,255,255,0.1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { 
                        position: 'right',
                        labels: { color: '#f8fafc' } 
                    }
                },
                scales: {
                    r: {
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { display: false }
                    }
                }
            }
        });
    </script>
</body>
</html>
